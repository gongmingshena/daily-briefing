# ============================================================
# 每日简报 — GitHub Actions 定时任务
# 每天 9:20 (北京时间) 自动执行 daily-briefing.py
# 通过 Server酱 推送到微信
#
# 设置方法：
#   1. 在 GitHub 仓库 Settings → Secrets and variables → Actions 中
#   2. 添加以下 secrets:
#      - MODELSCOPE_TOKEN: 魔搭 API token (ms-xxx)
#      - SERVERCHAN_KEY: Server酱 SendKey
# ============================================================

name: Daily Briefing

on:
  schedule:
    # 北京时间 2:00 = UTC 18:00 (前一日)
    - cron: '0 18 * * *'
  workflow_dispatch:  # 可手动触发

jobs:
  daily-briefing:
    runs-on: ubuntu-latest
    # GITHUB_TOKEN 需要写权限才能 commit 回仓库存档
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 lxml

      - name: Run global briefing (push to WeChat)
        env:
          MODELSCOPE_TOKEN: ${{ secrets.MODELSCOPE_TOKEN }}
          SERVERCHAN_KEY: ${{ secrets.SERVERCHAN_KEY }}
          PYTHONIOENCODING: utf-8
          BRIEFING_MODE: global
        run: |
          python scripts/daily-briefing.py

      - name: Commit briefing to repository
        run: |
          git config user.name "Daily Briefing Bot"
          git config user.email "bot@daily-briefing.gh"
          git add briefings/
          git diff --cached --quiet || git commit -m "global briefing $(date +'%Y-%m-%d')"
          git push

      - name: Upload output (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: briefing-output
          path: scripts/output/
