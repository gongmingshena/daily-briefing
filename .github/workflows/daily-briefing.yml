# ============================================================
# 每日简报 — GitHub Actions 定时任务
# 每天 9:20 (北京时间) 自动执行 daily-briefing.py
# 通过 Server酱 推送到微信
#
# 设置方法：
#   1. 在 GitHub 仓库 Settings → Secrets and variables → Actions 中
#   2. 添加以下 secrets:
#      - MODELSCOPE_TOKEN: 魔搭 API token (ms-xxx)
#      - SERVERCHAN_KEY: Server酱 SendKey
# ============================================================

name: Daily Briefing

on:
  schedule:
    # 北京时间 9:20 = UTC 1:20
    - cron: '20 1 * * *'
  workflow_dispatch:  # 可手动触发

jobs:
  daily-briefing:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 lxml

      - name: Run daily briefing
        env:
          MODELSCOPE_TOKEN: ${{ secrets.MODELSCOPE_TOKEN }}
          SERVERCHAN_KEY: ${{ secrets.SERVERCHAN_KEY }}
          PYTHONIOENCODING: utf-8
          # 国内服务器可能需要代理
          # HTTP_PROXY: ${{ secrets.HTTP_PROXY }}
          # HTTPS_PROXY: ${{ secrets.HTTPS_PROXY }}
        run: |
          python scripts/daily-briefing.py

      - name: Upload output (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: briefing-output
          path: scripts/output/
